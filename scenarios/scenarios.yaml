# ════════════════════════════════════════════════════════════════════════════
# scenarios.yaml — Alluvi v2 Hand-Curated Scenario Library
# ════════════════════════════════════════════════════════════════════════════
#
# 30 hand-curated scenarios. Each one is a complete director's brief for one
# UGC-style ad image. Each entry carries everything the prompt builder needs:
# scene, outfit, pose, grip, lighting, mood, framing, camera height.
#
# ─── DESIGN PRINCIPLES ────────────────────────────────────────────────────
# 1. OUTFIT VARIES across all 30 — never repeat. This is the architectural
#    fix for the same-white-sportsbra problem we hit in Phase 1.
# 2. PERSONA stays locked — same face, body type, hair color/length/texture
#    across every scenario. Read from persona.yaml. Never described here.
# 3. SCENE diversity — gym, pilates, bedroom, kitchen, bathroom, outdoor,
#    recovery, hero flat-lay. No two scenes use the exact same room.
# 4. POSE diversity — held high, held low, placed on surface, with phone,
#    without phone, three-quarter, full-body, close-up, overhead.
# 5. EVERY scenario maps to a known failure mode from the Phase 1 batch.
#    The resolves_failure_modes block links each scenario back to the
#    specific defect it is designed to defeat.
#
# ─── HOW THE PIPELINE USES THIS FILE ──────────────────────────────────────
# Step 1 prompt builder reads:  scene, outfit, pose, hand_assignment,
#                                lighting, mood, palette, framing, camera_height
# Step 2 prompt builder reads:  product placement intent (grip_or_placement),
#                                lighting (to lock the lighting hook),
#                                framing (to keep product in correct position)
# Both builders read:           id, category, archetype, difficulty
# Both builders ignore:         resolves_failure_modes (notes for humans)
#
# ─── ARCHETYPES (5 types) ─────────────────────────────────────────────────
# held_product_high    — product held at chest / face level, prominently visible
# held_product_low     — product held at hip / waist level, casually
# held_with_phone      — mirror selfie with phone in one hand, product in other
# placed_on_surface    — product placed on a counter / shelf / table beside her
# flat_lay             — overhead still life, persona may or may not appear
#
# ─── DIFFICULTY ───────────────────────────────────────────────────────────
# easy    — flat-lays or static placement, low compositing risk
# medium  — single hand placement, full-body or three-quarter framing
# hard    — mirror selfie with phone, close-up face, multi-element scenes
#
# ─── DISTRIBUTION (30 total) ──────────────────────────────────────────────
# Gym                   : 5    (1 easy / 2 medium / 2 hard)
# Pilates studio        : 5    (1 easy / 2 medium / 2 hard)
# Bedroom morning       : 4    (1 easy / 2 medium / 1 hard)
# Kitchen               : 4    (1 easy / 2 medium / 1 hard)
# Bathroom              : 3    (1 easy / 1 medium / 1 hard)
# Recovery / rest       : 3    (1 easy / 1 medium / 1 hard)
# Outdoor lifestyle     : 3    (1 easy / 2 medium)
# Hero flat-lay         : 3    (3 easy)
# ════════════════════════════════════════════════════════════════════════════

