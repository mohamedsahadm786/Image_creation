# plan_b.yaml — Plan B: FLUX Kontext (face-cropped) Step 1 + Nano Banana 2 Step 2
# Activated only if Plan A's PuLID gives weak persona/outfit results.

plan_name: plan_b

step_1:
  endpoint: fal-ai/flux-pro/kontext
  cost_per_image_usd: 0.04
  reference_image_path: assets/persona_face_only.jpg   # cropped face only — outfit not visible
  defaults:
    aspect_ratio: "9:16"
    guidance_scale: 3.5
    num_inference_steps: 30
    output_format: "jpeg"

step_2:
  endpoint: fal-ai/nano-banana-2/edit
  cost_per_image_usd: 0.04
  defaults:
    aspect_ratio: "9:16"
    resolution: "1K"
    num_images: 1
    output_format: "png"
    safety_tolerance: "4"
    enable_thinking: "high"

estimated_total_cost_per_image_usd: 0.08